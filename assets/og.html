<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --void:   #14121F;
    --panel:  #1D1A2B;
    --code-bg:#221E33;
    --line:   #322E45;
    --ink:    #DED9F0;
    --ink-soft:#A9A2CC;
    --ink-faint:#847DA6;
    --iris:   #7C6BF5;
    --iris-bri:#9A8CF9;
    --iris-btn:#6A57E8;
    --iris-wash:#241F3D;
    --iris-line:#4A3F86;
    --get:  #4FD69A;  --get-wash:#16241E;  --get-line:#23503C;
    --post: #F0B15C;  --post-wash:#26200F; --post-line:#55431C;
    --tok-key:#C9C3EC; --tok-str:#9E8CFB; --tok-num:#4FD69A; --tok-bool:#F0B15C; --tok-null:#847DA6; --tok-mono:#CFC9EC;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(900px 520px at 100% -10%, var(--iris-wash), transparent 58%),
      radial-gradient(720px 480px at -6% 108%, var(--get-wash), transparent 60%),
      var(--void);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    position: absolute; inset: 0;
    padding: 74px 82px;
    display: grid;
    grid-template-columns: 1.02fr 0.98fr;
    gap: 52px;
    align-items: center;
  }

  /* left column */
  .brand { display: flex; align-items: center; gap: 18px; }
  .brand .logo {
    width: 66px; height: 66px; border-radius: 18px;
    background: var(--iris-btn);
    display: grid; place-items: center;
    box-shadow: 0 18px 40px -18px rgba(106,87,232,0.8);
  }
  .brand .logo svg { width: 46px; height: 46px; }
  .brand .word { font-size: 48px; font-weight: 800; letter-spacing: -0.045em; color: var(--ink); }

  .eyebrow {
    margin-top: 42px;
    font-family: var(--mono); font-size: 20px; letter-spacing: 0.01em;
    color: var(--ink-faint);
  }
  h1 {
    margin-top: 16px;
    font-size: 62px; font-weight: 800; letter-spacing: -0.032em;
    line-height: 1.05; color: var(--ink); max-width: 13ch;
  }
  h1 .accent { color: var(--iris-bri); }

  /* the request -> response flow */
  .flow { margin-top: 40px; display: flex; align-items: center; gap: 18px; }
  .chip {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-radius: 14px;
    border: 1px solid var(--line); background: var(--panel);
    font-family: var(--mono); font-size: 26px; color: var(--ink);
    box-shadow: 0 16px 40px -22px rgba(0,0,0,0.7);
  }
  .chip.res { border-color: var(--iris-line); box-shadow: 0 0 0 1px var(--iris-line), 0 18px 44px -20px rgba(124,107,245,0.5); }
  .badge {
    font-family: var(--mono); font-size: 19px; font-weight: 700; letter-spacing: 0.04em;
    padding: 5px 11px; border-radius: 8px;
  }
  .badge.post { color: var(--post); background: var(--post-wash); border: 1px solid var(--post-line); }
  .badge.ok   { color: var(--get);  background: var(--get-wash);  border: 1px solid var(--get-line); }
  .arrow { color: var(--iris-bri); font-size: 40px; font-weight: 700; }

  /* right column: the payload window */
  .window {
    background: var(--code-bg);
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: 0 40px 80px -34px rgba(0,0,0,0.85), 0 0 0 1px var(--iris-line);
    overflow: hidden;
  }
  .win-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .win-bar .b {
    font-family: var(--mono); font-size: 17px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--get); background: var(--get-wash); border: 1px solid var(--get-line);
    padding: 4px 10px; border-radius: 7px;
  }
  .win-bar .route { font-family: var(--mono); font-size: 20px; color: var(--ink); font-weight: 600; }
  .win-bar .count { margin-left: auto; font-family: var(--mono); font-size: 16px; color: var(--ink-faint); }
  .code {
    padding: 22px 24px;
    font-family: var(--mono); font-size: 21px; line-height: 1.62;
    white-space: pre; color: var(--tok-mono);
  }
  .k { color: var(--tok-key); }
  .s { color: var(--tok-str); }
  .n { color: var(--tok-num); }
  .bo { color: var(--tok-bool); }
  .p { color: var(--ink-faint); }
</style>
</head>
<body>
  <div class="frame">
    <div>
      <div class="brand">
        <span class="logo">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <path d="M13 8 q-3 0 -3 3 v2 q0 2 -2 3 q2 1 2 3 v2 q0 3 3 3" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19 8 q3 0 3 3 v2 q0 2 2 3 q-2 1 -2 3 v2 q0 3 -3 3" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="16" cy="16" r="2.1" fill="#4FD69A"/>
          </svg>
        </span>
        <span class="word">apimock</span>
      </div>

      <p class="eyebrow">one example in · a working mock out</p>
      <h1>Mock a whole API from <span class="accent">one response.</span></h1>

      <div class="flow">
        <span class="chip"><span class="badge post">POST</span>/users</span>
        <span class="arrow">&rarr;</span>
        <span class="chip res"><span class="badge ok">200</span>{&hellip;}&nbsp;&times;N</span>
      </div>
    </div>

    <div class="window">
      <div class="win-bar">
        <span class="b">GET</span>
        <span class="route">/api/users</span>
        <span class="count">5 records</span>
      </div>
      <div class="code"><span class="p">[</span>
  <span class="p">{</span>
    <span class="k">"id"</span><span class="p">:</span> <span class="n">4821</span><span class="p">,</span>
    <span class="k">"name"</span><span class="p">:</span> <span class="s">"Ava Rivera"</span><span class="p">,</span>
    <span class="k">"email"</span><span class="p">:</span> <span class="s">"ava.rivera@mail.dev"</span><span class="p">,</span>
    <span class="k">"role"</span><span class="p">:</span> <span class="s">"admin"</span><span class="p">,</span>
    <span class="k">"is_active"</span><span class="p">:</span> <span class="bo">true</span>
  <span class="p">}</span><span class="p">,</span> <span class="p">…</span>
<span class="p">]</span></div>
    </div>
  </div>
</body>
</html>
