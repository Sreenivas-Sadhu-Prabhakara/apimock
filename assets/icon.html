<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #6A57E8; }
  body {
    display: grid; place-items: center;
    background:
      radial-gradient(120% 120% at 30% 20%, #7C6BF5, #5B48DA 70%);
  }
  /* 12% safe padding -> mark fills the middle ~76vmin */
  .mark { width: 74vmin; height: 74vmin; display: block; }
  .brace { fill: none; stroke: #ffffff; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .dot { fill: #4FD69A; }
</style>
</head>
<body>
  <!-- the braces-with-node mark: request { } wrapping a response node -->
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <path class="brace" d="M13 7 q-3.4 0 -3.4 3.4 v2.1 q0 2.3 -2.3 3.5 q2.3 1.2 2.3 3.5 v2.1 q0 3.4 3.4 3.4"/>
    <path class="brace" d="M19 7 q3.4 0 3.4 3.4 v2.1 q0 2.3 2.3 3.5 q-2.3 1.2 -2.3 3.5 v2.1 q0 3.4 -3.4 3.4"/>
    <circle class="dot" cx="16" cy="16" r="2.4"/>
  </svg>
</body>
</html>
